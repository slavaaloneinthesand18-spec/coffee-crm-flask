<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Take a break - Монитор заказов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0b1220; color: #e9eef8; }
        .topbar { position: sticky; top: 0; background: rgba(11,18,32,0.9); backdrop-filter: blur(8px); z-index: 10; }
        .card-order { border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); border-radius: 18px; }
        .card-ready { border-color: rgba(25,135,84,0.6); background: rgba(25,135,84,0.10); }
        .muted { color: rgba(233,238,248,0.7); }
        .big { font-size: 28px; font-weight: 800; letter-spacing: 0.2px; }
        .name { font-size: 22px; font-weight: 700; }
        .pill { border: 1px solid rgba(255,255,255,0.12); border-radius: 999px; padding: 6px 12px; }
    </style>
</head>
<body>
<div class="topbar border-bottom border-secondary border-opacity-25">
    <div class="container-fluid py-3">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-2">
                <div class="big">☕ Take a break</div>
                <div class="pill muted">Монитор заказов</div>
            </div>
            <div class="muted">Обновлено: <span id="updatedAt">—</span></div>
        </div>
    </div>
</div>

<div class="container-fluid py-4">
    <div class="row g-3">
        <div class="col-12 col-lg-6">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div class="pill">В процессе</div>
                <div class="muted small">new / preparing</div>
            </div>
            <div class="row g-3" id="inProgressGrid">
                <div class="muted">Загрузка…</div>
            </div>
        </div>
        <div class="col-12 col-lg-6">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div class="pill">Готовые</div>
                <div class="muted small">ready</div>
            </div>
            <div class="row g-3" id="readyGrid">
                <div class="muted">Загрузка…</div>
            </div>
        </div>
    </div>
</div>

<script>
    function escapeHtml(s) {
        return String(s || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function render(orders, generatedAt) {
        const inProgressGrid = document.getElementById('inProgressGrid');
        const readyGrid = document.getElementById('readyGrid');
        const updated = document.getElementById('updatedAt');
        if (updated) updated.textContent = generatedAt || '—';
        if (!inProgressGrid || !readyGrid) return;

        const all = Array.isArray(orders) ? orders : [];
        const inProgress = all.filter(o => o.status !== 'ready');
        const ready = all.filter(o => o.status === 'ready');

        const card = (o) => {
            const isReady = o.status === 'ready';
            const cls = isReady ? 'card-order card-ready' : 'card-order';
            const badge = isReady
                ? '<span class=\"badge text-bg-success\">ready</span>'
                : '<span class=\"badge text-bg-secondary\">new</span>';
            const name = o.customer_name ? escapeHtml(o.customer_name) : '—';
            return `
                <div class="col-12 col-md-6">
                    <div class="${cls} p-3 h-100">
                        <div class="d-flex justify-content-between align-items-start">
                            <div class="big">#${o.id}</div>
                            ${badge}
                        </div>
                        <div class="mt-2 name">${name}</div>
                    </div>
                </div>
            `;
        };

        inProgressGrid.innerHTML = inProgress.length
            ? inProgress.map(card).join('')
            : '<div class=\"muted\">Нет заказов</div>';

        readyGrid.innerHTML = ready.length
            ? ready.map(card).join('')
            : '<div class=\"muted\">Нет заказов</div>';
    }

    async function tick() {
        try {
            const res = await fetch('/api/monitor', { cache: 'no-store' });
            if (!res.ok) return;
            const data = await res.json();
            render(data.orders || [], data.generated_at);
        } catch (e) {
            // ignore
        }
    }

    tick();
    setInterval(tick, 2000);
</script>
</body>
</html>
